<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report Card Lookup — St. Francis De Sales School</title>
<meta name="robots" content="noindex, nofollow">
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f4f1ea;
    margin: 0;
    padding: 24px 16px;
    display: flex;
    justify-content: center;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    padding: 28px 24px;
    width: 100%;
    max-width: 420px;
  }
  h1 {
    font-size: 1.15rem;
    margin: 0 0 4px;
    color: #2C1F0E;
  }
  p.sub {
    font-size: 0.85rem;
    color: #6b6055;
    margin: 0 0 20px;
  }
  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: #4a4038;
    margin: 14px 0 4px;
  }
  select, input {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #ddd6c9;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: inherit;
  }
  button {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #8B6F47;
    color: #fff;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  #msg {
    margin-top: 14px;
    font-size: 0.85rem;
    padding: 10px 12px;
    border-radius: 8px;
    display: none;
  }
  #msg.error   { display: block; background: #fdecea; color: #b3261e; }
  #msg.info    { display: block; background: #eef2f7; color: #2c4a6e; }
</style>
</head>
<body>
  <div class="card">
    <h1>Report Card Lookup</h1>
    <p class="sub">Enter your child's Class, Roll No and Date of Birth to view their released Half-Yearly report card. No login required.</p>

    <form id="lookupForm">
      <label for="classSel">Class</label>
      <select id="classSel" required>
        <option value="">Select Class</option>
        <option value="SKG">SKG</option>
        <option value="LKG">LKG</option>
        <option value="1">Class I</option>
        <option value="2">Class II</option>
        <option value="3">Class III</option>
        <option value="4">Class IV</option>
        <option value="5">Class V</option>
        <option value="6">Class VI</option>
        <option value="7">Class VII</option>
        <option value="8">Class VIII</option>
        <option value="9">Class IX</option>
        <option value="10">Class X</option>
      </select>

      <label for="rollInput">Roll Number</label>
      <input type="number" id="rollInput" min="1" required placeholder="e.g. 12">

      <label for="dobInput">Date of Birth</label>
      <input type="date" id="dobInput" required>

      <button type="submit" id="submitBtn">View Report Card</button>
    </form>

    <div id="msg"></div>
  </div>

  <iframe id="resultFrame" style="display:none;width:100%;max-width:1100px;height:80vh;border:0;margin-top:20px"></iframe>

  <script type="module" src="app.js"></script>
</body>
</html>
