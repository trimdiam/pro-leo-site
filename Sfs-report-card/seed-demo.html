<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Demo Seed — SFS Mark Entry</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    .box { background:#16213e; border:1px solid #0f3460; border-radius:12px; padding:36px; max-width:500px; width:90%; text-align:center; }
    h2 { color:#e2b04a; margin-bottom:8px; }
    p  { color:#aaa; font-size:0.9rem; margin-bottom:24px; }
    input { width:100%; padding:10px; border-radius:6px; border:1px solid #333; background:#0d0d1a; color:#eee; font-size:1rem; margin-bottom:12px; box-sizing:border-box; }
    button { background:#e2b04a; color:#1a1a2e; border:none; border-radius:8px; padding:12px 32px; font-size:1rem; font-weight:700; cursor:pointer; width:100%; }
    button:disabled { opacity:0.5; cursor:default; }
    #log { margin-top:20px; text-align:left; font-size:0.82rem; color:#8bc; background:#0d0d1a; padding:12px; border-radius:6px; white-space:pre-wrap; max-height:200px; overflow-y:auto; display:none; }
    #status { margin-top:12px; font-weight:600; }
  </style>
</head>
<body>
<div class="box">
  <h2>🌱 Demo Data Seeder</h2>
  <p>Creates test marks for one student — fully locked and ready for View Report Card testing.</p>

  <input id="classId"    placeholder="Class ID  e.g. IX-A" value="IX-A">
  <input id="studentId"  placeholder="Student ID  e.g. SFS260101" value="SFS260101">
  <input id="studentName" placeholder="Student Name" value="Alvinson Mawrie">
  <input id="rollNo"     placeholder="Roll No" value="1" type="number">

  <button id="btnSeed">Seed Demo Marks</button>
  <div id="status"></div>
  <div id="log"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-init.js"></script>
<script>
const log = m => {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.textContent += m + '\n';
  el.scrollTop = el.scrollHeight;
};
const status = (m, ok=true) => {
  document.getElementById('status').textContent = m;
  document.getElementById('status').style.color = ok ? '#6f6' : '#f66';
};

// Demo marks data — Class IX standard scheme (IA/10 UT/30 TE/60)
function buildMarks(studentId, studentName, rollNo) {
  const subjects = {
    mathematics:       { IA:8,  UT:24, TE:52, total:84, singleMark:0 },
    science:           { IA:7,  UT:22, TE:48, total:77, singleMark:0 },
    social_studies:    { IA:9,  UT:26, TE:55, total:90, singleMark:0 },
    hindi:             { IA:6,  UT:20, TE:44, total:70, singleMark:0 },
    english_i:         { IA:8,  UT:25, TE:50, total:83, singleMark:0 },
    english_ii:        { IA:7,  UT:23, TE:47, total:77, singleMark:0 },
    khasi_alt_english: { IA:9,  UT:27, TE:56, total:92, singleMark:0 },
    history:           { IA:8,  UT:24, TE:51, total:83, singleMark:0 },
    civics:            { IA:7,  UT:21, TE:45, total:73, singleMark:0 },
  };
  const subjectsFT = {
    mathematics:       { IA:9,  UT:25, TE:54, total:88, singleMark:0 },
    science:           { IA:8,  UT:24, TE:50, total:82, singleMark:0 },
    social_studies:    { IA:9,  UT:27, TE:57, total:93, singleMark:0 },
    hindi:             { IA:7,  UT:22, TE:46, total:75, singleMark:0 },
    english_i:         { IA:8,  UT:26, TE:52, total:86, singleMark:0 },
    english_ii:        { IA:7,  UT:24, TE:48, total:79, singleMark:0 },
    khasi_alt_english: { IA:9,  UT:28, TE:58, total:95, singleMark:0 },
    history:           { IA:8,  UT:25, TE:53, total:86, singleMark:0 },
    civics:            { IA:8,  UT:23, TE:47, total:78, singleMark:0 },
  };

  const coScholastic = {
    pe:         { T1:'A+', T2:'A+' },
    singing:    { T1:'A',  T2:'A'  },
    discipline: { T1:'A+', T2:'A+' },
    gk:         { T1:'B+', T2:'A'  },
    arts_craft: { T1:'A',  T2:'A+' },
    neatness:   { T1:'A+', T2:'A+' },
    val_edu:    { T1:'A',  T2:'A'  },
  };

  const attendance = { hyPresent:82, hyTotal:95, ftPresent:88, ftTotal:100 };
  const remarks = {
    halfYearly: 'Alvinson has shown consistent effort across subjects. Performance in Social Studies and Khasi is commendable. Encourage improvement in Hindi.',
    finalTerm:  'Excellent progress this term. Alvinson demonstrates strong academic discipline and is well-prepared for promotion.',
    principal:  'A dedicated student showing steady improvement. Keep up the good work!'
  };
  const rank = { hyRank:3, ftRank:2, totalStudents:28, autoComputed:true };

  const base = {
    studentId, studentName, rollNo,
    coScholastic, attendance, remarks, rank,
    status:        'locked',
    lastUpdatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    lastUpdatedBy: 'seed-demo'
  };

  return {
    HY: { ...base, academics: subjects },
    FT: { ...base, academics: subjectsFT }
  };
}

document.getElementById('btnSeed').addEventListener('click', async () => {
  const btn       = document.getElementById('btnSeed');
  const classId   = document.getElementById('classId').value.trim();
  const studentId = document.getElementById('studentId').value.trim();
  const name      = document.getElementById('studentName').value.trim();
  const rollNo    = parseInt(document.getElementById('rollNo').value) || 1;

  if (!classId || !studentId || !name) { status('Fill all fields', false); return; }

  btn.disabled = true;
  status('Seeding…');

  try {
    const user = await new Promise(res => auth.onAuthStateChanged(res));
    if (!user) { status('Not signed in — open markentry.html first then come back', false); btn.disabled=false; return; }
    log('Auth OK: ' + user.email);

    const marks = buildMarks(studentId, name, rollNo);

    for (const term of ['HY','FT']) {
      const ref = db.collection('marks').doc(`${classId}_${term}`)
                    .collection('students').doc(studentId);
      await ref.set(marks[term]);
      log(`Written: marks/${classId}_${term}/students/${studentId}`);
    }

    status('✅ Demo data seeded and locked! Go to markentry.html → CT Dashboard → open the student.', true);
    log('\nDone. Open markentry.html and log in as the class teacher for ' + classId);
  } catch(e) {
    status('Error: ' + e.message, false);
    log('ERROR: ' + e.message);
    btn.disabled = false;
  }
});
</script>
</body>
</html>
